<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasep 100 Remote</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        .title { margin-bottom: 20px; font-size: 28px; font-weight: bold; background: linear-gradient(to right, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; max-width: 400px; }
        button { padding: 18px; font-size: 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 12px; background: #1e293b; color: white; transition: 0.1s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        button:active { background: #334155; transform: scale(0.95); }
        .wrong { background: #ef4444; grid-column: span 2; }
        .wrong:active { background: #dc2626; }
        .reset { background: #f59e0b; grid-column: span 2; }
        .reset:active { background: #d97706; }
    </style>
</head>
<body>
    <div class="title">Game Remote</div>
    <div class="grid" id="container">
        <!-- Buttons injected by JS -->
    </div>

    <script>
        const container = document.getElementById('container');
        
        async function sendAction(key) {
            try {
                // Flash animation for feedback
                if(navigator.vibrate) navigator.vibrate(50);
                await fetch('/action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key })
                });
            } catch (e) {
                console.error(e);
            }
        }

        // Create buttons 1-8 (usually family 100 has max 8 answers, we'll give 8 or 10)
        for (let i = 1; i <= 8; i++) {
            const btn = document.createElement('button');
            btn.innerText = `Buka ${i}`;
            btn.onclick = () => sendAction(i.toString());
            container.appendChild(btn);
        }

        // Wrong button
        const btnWrong = document.createElement('button');
        btnWrong.innerText = 'TETOT (Satu Salah)';
        btnWrong.className = 'wrong';
        btnWrong.onclick = () => sendAction('x');
        container.appendChild(btnWrong);

        // Reset wrong count
        const btnReset = document.createElement('button');
        btnReset.innerText = 'Reset Salah';
        btnReset.className = 'reset';
        btnReset.onclick = () => sendAction('r');
        container.appendChild(btnReset);
    </script>
</body>
</html>
